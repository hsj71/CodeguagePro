<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beautiful Todo App</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

/* Container */
.container {
  background: white;
  width: 400px;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

/* Input */
.input-box {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.input-box input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  outline: none;
}

.input-box button {
  padding: 10px 15px;
  border: none;
  background: #667eea;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.input-box button:hover {
  background: #5a67d8;
}

/* Filters */
.filters {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

.filters button {
  flex: 1;
  margin: 2px;
  padding: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #eee;
}

.filters button.active {
  background: #667eea;
  color: white;
}

/* Todo List */
ul {
  list-style: none;
  max-height: 300px;
  overflow-y: auto;
}

li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  background: #f7f7f7;
  transition: 0.3s;
}

li.completed {
  text-decoration: line-through;
  opacity: 0.6;
}

li:hover {
  transform: scale(1.02);
}

/* Buttons */
.actions button {
  margin-left: 5px;
  border: none;
  padding: 5px 8px;
  border-radius: 6px;
  cursor: pointer;
}

.complete-btn {
  background: #38a169;
  color: white;
}

.delete-btn {
  background: #e53e3e;
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <h1>📝 Todo List</h1>

  <div class="input-box">
    <input type="text" id="taskInput" placeholder="Enter task...">
    <button onclick="addTask()">Add</button>
  </div>

  <div class="filters">
    <button onclick="setFilter('all')" class="active">All</button>
    <button onclick="setFilter('active')">Active</button>
    <button onclick="setFilter('completed')">Completed</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let currentFilter = "all";

function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
  const input = document.getElementById("taskInput");
  const text = input.value.trim();

  if (text === "") return;

  tasks.push({ text, completed: false });
  input.value = "";

  saveTasks();
  renderTasks();
}

function toggleTask(index) {
  tasks[index].completed = !tasks[index].completed;
  saveTasks();
  renderTasks();
}

function deleteTask(index) {
  tasks.splice(index, 1);
  saveTasks();
  renderTasks();
}

function setFilter(filter) {
  currentFilter = filter;

  document.querySelectorAll(".filters button").forEach(btn => {
    btn.classList.remove("active");
  });

  event.target.classList.add("active");

  renderTasks();
}

function renderTasks() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((task, index) => {

    if (
      currentFilter === "active" && task.completed ||
      currentFilter === "completed" && !task.completed
    ) return;

    const li = document.createElement("li");
    if (task.completed) li.classList.add("completed");

    li.innerHTML = `
      <span>${task.text}</span>
      <div class="actions">
        <button class="complete-btn" onclick="toggleTask(${index})">✔</button>
        <button class="delete-btn" onclick="deleteTask(${index})">✖</button>
      </div>
    `;

    list.appendChild(li);
  });
}

// Enter key support
document.getElementById("taskInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") addTask();
});

// Initial render
renderTasks();
</script>

</body>
</html>
