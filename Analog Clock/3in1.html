<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Analog Clock</title>

<style>
body {
  margin: 0;
  background: #e5e5e5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

/* Clock Container */
.clock {
  width: 350px;
  height: 350px;
  border: 10px solid #bdbdbd;
  border-radius: 50%;
  position: relative;
  background: #f8f8f8;
}

/* Center Dot */
.center {
  width: 14px;
  height: 14px;
  background: gray;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
}

/* Hands */
.hand {
  position: absolute;
  bottom: 50%;
  left: 50%;
  transform-origin: bottom;
}

.hour {
  width: 6px;
  height: 80px;
  background: #888;
}

.minute {
  width: 4px;
  height: 110px;
  background: #999;
}

.second {
  width: 2px;
  height: 130px;
  background: red;
}

/* Numbers */
.number {
  position: absolute;
  width: 100%;
  height: 100%;
  text-align: center;
  font-size: 26px;
}

.number span {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

/* Position Numbers */
.number1 span  { top: 20px; right: 80px; }
.number2 span  { top: 70px; right: 20px; }
.number3 span  { top: 150px; right: 10px; }
.number4 span  { bottom: 70px; right: 20px; }
.number5 span  { bottom: 20px; right: 80px; }
.number6 span  { bottom: 5px; left: 50%; transform: translateX(-50%); }
.number7 span  { bottom: 20px; left: 80px; }
.number8 span  { bottom: 70px; left: 20px; }
.number9 span  { top: 150px; left: 10px; }
.number10 span { top: 70px; left: 20px; }
.number11 span { top: 20px; left: 80px; }
.number12 span { top: 5px; left: 50%; transform: translateX(-50%); }

/* Ticks */
.tick {
  position: absolute;
  width: 2px;
  height: 10px;
  background: #777;
  top: 0;
  left: 50%;
  transform-origin: bottom;
}

.tick.bold {
  height: 18px;
  width: 3px;
}
</style>

</head>
<body>

<div class="clock" id="clock">

  <!-- Hands -->
  <div class="hand hour" id="hour"></div>
  <div class="hand minute" id="minute"></div>
  <div class="hand second" id="second"></div>
  <div class="center"></div>

  <!-- Numbers -->
  <div class="number number1"><span>1</span></div>
  <div class="number number2"><span>2</span></div>
  <div class="number number3"><span>3</span></div>
  <div class="number number4"><span>4</span></div>
  <div class="number number5"><span>5</span></div>
  <div class="number number6"><span>6</span></div>
  <div class="number number7"><span>7</span></div>
  <div class="number number8"><span>8</span></div>
  <div class="number number9"><span>9</span></div>
  <div class="number number10"><span>10</span></div>
  <div class="number number11"><span>11</span></div>
  <div class="number number12"><span>12</span></div>

</div>

<script>
// Add ticks dynamically
const clock = document.getElementById("clock");

for (let i = 0; i < 60; i++) {
  const tick = document.createElement("div");
  tick.classList.add("tick");

  if (i % 5 === 0) tick.classList.add("bold");

  tick.style.transform = `rotate(${i * 6}deg) translateX(-50%)`;
  clock.appendChild(tick);
}

// Clock Logic
function updateClock() {
  const now = new Date();

  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = hr * 30 + min * 0.5;

  document.getElementById("second").style.transform =
    `rotate(${secDeg}deg) translateX(-50%)`;

  document.getElementById("minute").style.transform =
    `rotate(${minDeg}deg) translateX(-50%)`;

  document.getElementById("hour").style.transform =
    `rotate(${hrDeg}deg) translateX(-50%)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
